name: Publish Test Artifacts

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "remote-dev branch, tag, or SHA to publish; do not default to main for test"
        required: true
        type: string
      arch:
        description: "Host/test architecture subset"
        required: false
        default: "aarch64"
        type: choice
        options:
          - aarch64
          - x86_64
          - both

permissions:
  contents: read

env:
  TARGET: host-service-test
  TARGET_BRANCH: host-service-test
  TARGET_PROJECT: remote-dev-host-test
  REGION: us-west1
  SERVICE: remote-dev-host-service
  IMAGE_REPOSITORY: remote-dev
  IMAGE_NAME: host-service
  CARGO_TERM_COLOR: always

jobs:
  resolve-source:
    runs-on: ubuntu-latest
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      source_ref: ${{ steps.source.outputs.source_ref }}
      source_version: ${{ steps.source.outputs.source_version }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4

      - name: Checkout remote-dev source
        uses: actions/checkout@v4
        with:
          repository: M-Adoo/remote-dev
          token: ${{ secrets.REMOTE_DEV_READ_TOKEN }}
          ref: ${{ inputs.source_ref }}
          path: remote-dev
          persist-credentials: false

      - name: Resolve clean source SHA
        id: source
        working-directory: remote-dev
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "remote-dev source checkout is dirty" >&2
            exit 1
          fi
          echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "source_ref=${{ inputs.source_ref }}" >> "$GITHUB_OUTPUT"
          VERSION="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          if [ -z "$VERSION" ]; then
            echo "failed to read workspace version from Cargo.toml" >&2
            exit 1
          fi
          echo "source_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve build matrix
        id: matrix
        run: |
          MATRIX="$(python3 scripts/publish.py matrix --target "$TARGET" --arch "${{ inputs.arch }}")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Remove private source checkout
        if: always()
        run: rm -rf remote-dev

  build-binary:
    needs: resolve-source
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-source.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4

      - name: Checkout remote-dev source
        uses: actions/checkout@v4
        with:
          repository: M-Adoo/remote-dev
          token: ${{ secrets.REMOTE_DEV_READ_TOKEN }}
          ref: ${{ needs.resolve-source.outputs.source_sha }}
          path: remote-dev
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cargo_target }}

      - name: Build binary
        working-directory: remote-dev
        run: |
          cargo build --release --target "${{ matrix.cargo_target }}" -p "${{ matrix.package }}" --bin "${{ matrix.binary }}"

      - name: Package binary
        run: |
          mkdir -p out
          tar -C "remote-dev/target/${{ matrix.cargo_target }}/release" -czf "out/${{ matrix.artifact }}.tar.gz" "${{ matrix.binary }}"
          python3 scripts/publish.py write-binary-manifest \
            --target "$TARGET" \
            --kind "${{ matrix.kind }}" \
            --source-ref "${{ needs.resolve-source.outputs.source_ref }}" \
            --source-sha "${{ needs.resolve-source.outputs.source_sha }}" \
            --system "${{ matrix.system }}" \
            --arch "${{ matrix.arch }}" \
            --cargo-target "${{ matrix.cargo_target }}" \
            --package "${{ matrix.package }}" \
            --binary "${{ matrix.binary }}" \
            --artifact "${{ matrix.artifact }}" \
            --tarball "out/${{ matrix.artifact }}.tar.gz" \
            --output "out/${{ matrix.artifact }}.build.json"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: error

      - name: Remove private source checkout
        if: always()
        run: rm -rf remote-dev

  build-image:
    needs: resolve-source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4

      - name: Checkout remote-dev source
        uses: actions/checkout@v4
        with:
          repository: M-Adoo/remote-dev
          token: ${{ secrets.REMOTE_DEV_READ_TOKEN }}
          ref: ${{ needs.resolve-source.outputs.source_sha }}
          path: remote-dev
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 image tar
        env:
          IMAGE_TAG: test-${{ needs.resolve-source.outputs.source_sha }}
        run: |
          mkdir -p out
          IMAGE="$REGION-docker.pkg.dev/$TARGET_PROJECT/$IMAGE_REPOSITORY/$IMAGE_NAME:${IMAGE_TAG:0:17}"
          docker buildx build \
            --platform linux/amd64 \
            -f remote-dev/Dockerfile.host-service \
            -t "$IMAGE" \
            --build-arg CARGO_PROFILE_RELEASE_OPT_LEVEL=3 \
            --output "type=docker,dest=$PWD/out/host-service-linux-amd64.tar" \
            remote-dev
          zstd -19 -f out/host-service-linux-amd64.tar -o out/host-service-linux-amd64.tar.zst
          rm out/host-service-linux-amd64.tar
          echo "$IMAGE" > out/host-service-image-ref.txt
          python3 scripts/publish.py write-image-manifest \
            --target "$TARGET" \
            --source-ref "${{ needs.resolve-source.outputs.source_ref }}" \
            --source-sha "${{ needs.resolve-source.outputs.source_sha }}" \
            --tarball out/host-service-linux-amd64.tar.zst \
            --output out/host-service-linux-amd64.build.json

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: host-service-linux-amd64
          path: out/*
          if-no-files-found: error

      - name: Remove private source checkout
        if: always()
        run: rm -rf remote-dev

  publish:
    needs:
      - resolve-source
      - build-binary
      - build-image
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: write
      id-token: write
      actions: write
    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4
        with:
          path: publisher
          fetch-depth: 0

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          path: published
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-platforms = x86_64-linux aarch64-linux

      - name: Set up QEMU for Nix bootstrap realization
        uses: docker/setup-qemu-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Install gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Prepare Nix cache signing key
        env:
          NIX_CACHE_SIGNING_KEY: ${{ secrets.REMOTE_DEV_NIX_CACHE_SIGNING_KEY }}
        run: |
          if [ -z "$NIX_CACHE_SIGNING_KEY" ]; then
            echo "REMOTE_DEV_NIX_CACHE_SIGNING_KEY secret is required" >&2
            exit 1
          fi
          printf '%s' "$NIX_CACHE_SIGNING_KEY" > "$RUNNER_TEMP/nix-cache-signing-key"
          chmod 600 "$RUNNER_TEMP/nix-cache-signing-key"

      - name: Push image
        id: image
        run: |
          IMAGE="$(cat downloaded/host-service-image-ref.txt)"
          zstd -d -c downloaded/host-service-linux-amd64.tar.zst | docker load
          docker push "$IMAGE"
          DEPLOYED_IMAGE="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")"
          DIGEST="${DEPLOYED_IMAGE#*@}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "deployed_image=$DEPLOYED_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Render target branch
        run: |
          python3 publisher/scripts/publish.py render-tree \
            --target "$TARGET" \
            --arch "${{ inputs.arch }}" \
            --artifacts-dir downloaded \
            --branch-dir published \
            --source-ref "${{ needs.resolve-source.outputs.source_ref }}" \
            --source-sha "${{ needs.resolve-source.outputs.source_sha }}" \
            --nix-cache-public-key "${{ vars.REMOTE_DEV_NIX_CACHE_PUBLIC_KEY }}" \
            --nix-cache-signing-key-file "$RUNNER_TEMP/nix-cache-signing-key" \
            --image "${{ steps.image.outputs.image }}" \
            --image-digest "${{ steps.image.outputs.digest }}" \
            --deployed-image "${{ steps.image.outputs.deployed_image }}" \
            --workflow-run-id "$GITHUB_RUN_ID"

      - name: Commit target branch
        working-directory: published
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "host-service-test: publish ${{ needs.resolve-source.outputs.source_sha }}" || echo "No changes to commit"

      - name: Apply host-service-test retention
        run: |
          python3 publisher/scripts/publish.py cleanup-test-branch \
            --branch-dir published \
            --branch "$TARGET_BRANCH" \
            --max-commits 5 \
            --max-days 7

      - name: Push target branch
        working-directory: published
        run: git push --force origin "$TARGET_BRANCH"

      - name: Deploy Cloud Run
        run: |
          SERVICE_ACCOUNT="remote-dev-host-service@$TARGET_PROJECT.iam.gserviceaccount.com"
          gcloud run deploy "$SERVICE" \
            --image "${{ steps.image.outputs.deployed_image }}" \
            --region "$REGION" \
            --project "$TARGET_PROJECT" \
            --service-account "$SERVICE_ACCOUNT" \
            --set-env-vars "REMOTE_DEV_HOST_SERVICE_CONFIG=/app/config/host-service-test.toml" \
            --cpu 1 \
            --concurrency 5 \
            --timeout 600 \
            --max-instances 20 \
            --allow-unauthenticated \
            --quiet

      - name: Delete successful run record
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run delete "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --yes || true

      - name: Remove private files
        if: always()
        run: rm -rf downloaded "$RUNNER_TEMP/nix-cache-signing-key"
