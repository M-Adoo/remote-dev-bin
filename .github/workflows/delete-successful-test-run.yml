name: Delete Successful Test Run Record

on:
  workflow_run:
    workflows:
      - Publish Test Artifacts
      - Cleanup HostService Test Artifacts
    types:
      - completed

permissions:
  actions: write

jobs:
  delete:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Delete successful test run record
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_RUN_NAME: ${{ github.event.workflow_run.name }}
        run: |
          if [ -z "$SOURCE_RUN_ID" ]; then
            echo "workflow_run.id is required" >&2
            exit 1
          fi
          echo "Deleting successful $SOURCE_RUN_NAME run $SOURCE_RUN_ID"
          gh run delete "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY"
